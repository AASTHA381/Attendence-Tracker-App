<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClassTrack" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <title>ClassTrack</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary:       #4f46e5;
      --primary-dark:  #3730a3;
      --safe:          #16a34a;
      --safe-bg:       #dcfce7;
      --safe-text:     #15803d;
      --warn:          #d97706;
      --warn-bg:       #fef3c7;
      --warn-text:     #b45309;
      --danger:        #dc2626;
      --danger-bg:     #fee2e2;
      --danger-text:   #b91c1c;
      --bg:            #f1f5f9;
      --card:          #ffffff;
      --text:          #0f172a;
      --text-2:        #64748b;
      --border:        #e2e8f0;
      --sat:           env(safe-area-inset-top, 0px);
      --sab:           env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: calc(var(--sat) + 14px) 18px 14px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(79,70,229,.35);
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .back-btn:active { background: rgba(255,255,255,.3); }
    .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .header-text p  { font-size: 12px; opacity: .75; margin-top: 2px; }

    /* ── Scrollable content ── */
    .content {
      padding: 16px 16px calc(28px + var(--sab));
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Install banner ── */
    .install-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: linear-gradient(135deg,#4f46e5,#7c3aed);
      color: #fff;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }
    .install-banner-icon { font-size: 28px; flex-shrink: 0; }
    .install-banner-body { flex: 1; }
    .install-banner-body h3 { font-size: 14px; font-weight: 600; }
    .install-banner-body p  { font-size: 12px; opacity: .85; margin-top: 3px; line-height: 1.45; }
    .install-banner-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    /* ── Overall card ── */
    .overall-card {
      background: linear-gradient(135deg,#4f46e5,#7c3aed);
      color: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 18px rgba(79,70,229,.3);
    }
    .overall-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      opacity: .8;
      margin-bottom: 6px;
    }
    .overall-pct {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }
    .overall-sub {
      font-size: 13px;
      opacity: .75;
      margin-top: 5px;
    }
    .overall-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.2);
      padding-top: 14px;
    }
    .overall-stat { text-align: center; }
    .overall-stat .v { font-size: 26px; font-weight: 700; }
    .overall-stat .l { font-size: 11px; opacity: .7; margin-top: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    /* ── Subject card ── */
    .subject-card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      animation: fadeUp .35s ease both;
    }
    .subject-card:active { transform: scale(.975); box-shadow: 0 0 0 rgba(0,0,0,0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .subject-card:nth-child(1) { animation-delay: .04s; }
    .subject-card:nth-child(2) { animation-delay: .08s; }
    .subject-card:nth-child(3) { animation-delay: .12s; }
    .subject-card:nth-child(4) { animation-delay: .16s; }
    .subject-card:nth-child(5) { animation-delay: .20s; }
    .subject-card:nth-child(6) { animation-delay: .24s; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .subject-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-safe   { background: var(--safe-bg);   color: var(--safe-text); }
    .badge-warn   { background: var(--warn-bg);   color: var(--warn-text); }
    .badge-danger { background: var(--danger-bg); color: var(--danger-text); }

    /* miss bar */
    .miss-bar-wrap {
      height: 7px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .miss-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .3s ease;
    }
    .miss-bar-safe   { background: var(--safe); }
    .miss-bar-warn   { background: var(--warn); }
    .miss-bar-danger { background: var(--danger); }

    .card-stats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 6px;
    }
    .cs {
      background: var(--bg);
      border-radius: 10px;
      padding: 7px 4px;
      text-align: center;
    }
    .cs-v { font-size: 17px; font-weight: 700; }
    .cs-l { font-size: 9px; color: var(--text-2); margin-top: 1px; text-transform: uppercase; letter-spacing: .3px; }
    .cs-v-safe   { color: var(--safe); }
    .cs-v-warn   { color: var(--warn); }
    .cs-v-danger { color: var(--danger); }
    .cs-v-primary { color: var(--primary); }

    /* ── Detail view ── */
    #detail-view { display: none; }

    /* log section */
    .log-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .log-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }

    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .date-row label { font-size: 13px; color: var(--text-2); flex-shrink: 0; }
    .date-row input[type="date"] {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .date-row input[type="date"]:focus { border-color: var(--primary); }

    .log-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .12s, transform .12s;
      font-family: inherit;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn-present { background: var(--safe-bg);   color: var(--safe-text); }
    .btn-absent  { background: var(--danger-bg); color: var(--danger-text); }

    /* status card */
    .status-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .status-icon-big { font-size: 34px; flex-shrink: 0; }
    .status-right { flex: 1; }
    .status-msg { font-size: 15px; font-weight: 700; }
    .status-detail { font-size: 12px; color: var(--text-2); margin-top: 3px; }
    .mini-bar-wrap {
      margin-top: 9px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .mini-bar { height: 100%; border-radius: 99px; transition: width .3s; }
    .mini-bar-caption { font-size: 10px; color: var(--text-2); margin-top: 4px; }

    /* sessions list */
    .sessions-box {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .sessions-box-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .week-divider {
      padding: 6px 16px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-2);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
    }
    .session-row:last-child { border-bottom: none; }
    .sess-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sess-present { background: var(--safe-bg);   color: var(--safe); }
    .sess-absent  { background: var(--danger-bg); color: var(--danger); }

    .sess-info { flex: 1; }
    .sess-label { font-size: 13px; font-weight: 500; }
    .sess-date  { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    .sess-icon { font-size: 17px; }
    .del-btn {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 15px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      transition: background .12s;
    }
    .del-btn:active { background: var(--border); }

    /* empty state */
    .empty-state {
      padding: 48px 20px;
      text-align: center;
    }
    .empty-state .ei { font-size: 52px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-state p  { font-size: 13px; color: var(--text-2); line-height: 1.55; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(24px + var(--sab));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(15,23,42,.92);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 11px 22px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="dashboard-view">
  <div class="header">
    <div class="header-row">
      <div class="header-text">
        <h1>📚 ClassTrack</h1>
        <p>MBA Attendance Manager</p>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- install hint (iOS) -->
    <div class="install-banner" id="install-banner">
      <div class="install-banner-icon">📲</div>
      <div class="install-banner-body">
        <h3>Add to Home Screen</h3>
        <p>Tap the Share button, then "Add to Home Screen" to install this app on your iPhone.</p>
      </div>
      <button class="install-banner-close" onclick="dismissBanner()" aria-label="Dismiss">✕</button>
    </div>

    <!-- overall summary -->
    <div class="overall-card" id="overall-card"></div>

    <div class="section-label">Subjects</div>
    <div id="subjects-container"></div>
  </div>
</div>

<!-- ══════════════ DETAIL ══════════════ -->
<div id="detail-view">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="showDashboard()" aria-label="Back">‹</button>
      <div class="header-text">
        <h1 id="detail-title">Subject</h1>
        <p id="detail-subtitle">0 / 20 attended</p> <!-- updated by JS -->
      </div>
    </div>
  </div>

  <div class="content">
    <!-- log session -->
    <div class="log-card">
      <h3>Log a Session</h3>
      <div class="date-row">
        <label for="session-date">Date</label>
        <input type="date" id="session-date" />
      </div>
      <div class="log-btns">
        <button class="btn btn-present" onclick="logSession('present')">✓ &nbsp;Present</button>
        <button class="btn btn-absent"  onclick="logSession('absent')">✗ &nbsp;Absent</button>
      </div>
    </div>

    <!-- attendance status -->
    <div class="status-card" id="status-card"></div>

    <!-- session history -->
    <div id="sessions-container"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Constants ── */
const SUBJECTS = [
  { id: 'product_strategy',      name: 'Product Strategy',      total: 20, maxMiss: 4, sessionsPerWeek: 2 },
  { id: 'consumer_behaviour',    name: 'Consumer Behaviour',    total: 20, maxMiss: 4, sessionsPerWeek: 2 },
  { id: 'market_analytics',      name: 'Market Analytics',      total: 20, maxMiss: 4, sessionsPerWeek: 2 },
  { id: 'ai_for_managers',       name: 'AI for Managers',       total: 20, maxMiss: 4, sessionsPerWeek: 2 },
  { id: 'management_consulting', name: 'Management Consulting', total: 20, maxMiss: 4, sessionsPerWeek: 2 },
  { id: 'business_simulation',   name: 'Business Simulation',   total: 10, maxMiss: 2, sessionsPerWeek: 1 },
];

/* ── State ── */
let currentId = null;
let data = loadData();

/* ── Persistence ── */
function loadData() {
  try {
    const raw = localStorage.getItem('classtrack_v1');
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  const d = { subjects: {} };
  SUBJECTS.forEach(s => { d.subjects[s.id] = { sessions: [] }; });
  return d;
}

function save() {
  localStorage.setItem('classtrack_v1', JSON.stringify(data));
}

/* ── Stats ── */
function stats(id) {
  const subject  = SUBJECTS.find(s => s.id === id);
  const TOTAL    = subject.total;
  const MAX_MISS = subject.maxMiss;
  const sessions = data.subjects[id]?.sessions ?? [];
  const held     = sessions.length;
  const attended = sessions.filter(s => s.status === 'present').length;
  const missed   = held - attended;
  const remaining = TOTAL - held;
  const canMiss  = MAX_MISS - missed;
  const pct      = held > 0 ? Math.round((attended / held) * 100) : 100;
  const severity = canMiss <= 0 ? 'danger' : canMiss === 1 ? 'warn' : 'safe';
  return { sessions, held, attended, missed, remaining, canMiss, pct, severity, TOTAL, MAX_MISS };
}

function overallStats() {
  let attended = 0, held = 0, missed = 0, canMiss = 0;
  SUBJECTS.forEach(s => {
    const st = stats(s.id);
    attended += st.attended;
    held     += st.held;
    missed   += st.missed;
    canMiss  += Math.max(0, st.canMiss);
  });
  const pct = held > 0 ? Math.round((attended / held) * 100) : 100;
  return { attended, held, missed, canMiss, pct };
}

/* ── Render Dashboard ── */
function renderDashboard() {
  const ov = overallStats();

  document.getElementById('overall-card').innerHTML = `
    <div class="overall-label">Overall Attendance</div>
    <div class="overall-pct">${ov.pct}<span style="font-size:24px;font-weight:600;opacity:.7">%</span></div>
    <div class="overall-sub">${ov.attended} attended · ${ov.missed} missed</div>
    <div class="overall-grid">
      <div class="overall-stat"><div class="v">${ov.attended}</div><div class="l">Attended</div></div>
      <div class="overall-stat"><div class="v">${ov.missed}</div><div class="l">Missed</div></div>
      <div class="overall-stat"><div class="v">${ov.canMiss}</div><div class="l">Can Skip</div></div>
    </div>`;

  const container = document.getElementById('subjects-container');
  container.innerHTML = '';

  SUBJECTS.forEach(subject => {
    const st = stats(subject.id);
    const barW = Math.min(100, (st.missed / st.MAX_MISS) * 100);

    let badgeText;
    if (st.canMiss <= 0) {
      badgeText = '🚫 No skips left';
    } else if (st.canMiss === 1) {
      badgeText = '⚠️ 1 skip left';
    } else {
      badgeText = `✓ ${st.canMiss} skips left`;
    }

    const card = document.createElement('div');
    card.className = 'subject-card';
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', subject.name);
    card.onclick = () => showDetail(subject.id);
    card.innerHTML = `
      <div class="card-top">
        <div class="subject-name">${subject.name}</div>
        <span class="badge badge-${st.severity}">${badgeText}</span>
      </div>
      <div class="miss-bar-wrap">
        <div class="miss-bar miss-bar-${st.severity}" style="width:${barW}%"></div>
      </div>
      <div class="card-stats">
        <div class="cs"><div class="cs-v cs-v-primary">${st.attended}</div><div class="cs-l">Attended</div></div>
        <div class="cs"><div class="cs-v cs-v-${st.severity}">${st.missed}</div><div class="cs-l">Missed</div></div>
        <div class="cs"><div class="cs-v cs-v-${st.severity}">${Math.max(0, st.canMiss)}</div><div class="cs-l">Can Skip</div></div>
        <div class="cs"><div class="cs-v" style="color:var(--text-2)">${st.remaining}</div><div class="cs-l">Left</div></div>
      </div>`;
    container.appendChild(card);
  });
}

/* ── Show Detail ── */
function showDetail(id) {
  currentId = id;
  document.getElementById('dashboard-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  // default date = today
  document.getElementById('session-date').value = todayStr();
  renderDetail();
  window.scrollTo(0, 0);
}

function showDashboard() {
  currentId = null;
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('dashboard-view').style.display = 'block';
  renderDashboard();
  window.scrollTo(0, 0);
}

/* ── Render Detail ── */
function renderDetail() {
  const subject = SUBJECTS.find(s => s.id === currentId);
  const st = stats(currentId);

  document.getElementById('detail-title').textContent = subject.name;
  document.getElementById('detail-subtitle').textContent =
    `${st.attended} / ${st.TOTAL} sessions attended`;

  /* status card */
  let icon, msg, color;
  if (st.canMiss <= 0) {
    icon = '🚫'; color = 'var(--danger)';
    msg  = 'You cannot miss any more sessions!';
  } else if (st.canMiss === 1) {
    icon = '⚠️'; color = 'var(--warn)';
    msg  = 'Only 1 more session can be missed!';
  } else {
    icon = '✅'; color = 'var(--safe)';
    msg  = `You can miss ${st.canMiss} more session${st.canMiss !== 1 ? 's' : ''} safely.`;
  }

  const barFill = Math.min(100, (st.missed / st.MAX_MISS) * 100);

  document.getElementById('status-card').innerHTML = `
    <div class="status-icon-big">${icon}</div>
    <div class="status-right">
      <div class="status-msg" style="color:${color}">${msg}</div>
      <div class="status-detail">
        ${st.missed} / ${st.MAX_MISS} misses used &nbsp;·&nbsp; ${st.held} / ${st.TOTAL} sessions held
      </div>
      <div class="mini-bar-wrap">
        <div class="mini-bar" style="width:${barFill}%;background:${color}"></div>
      </div>
      <div class="mini-bar-caption">${st.missed} of ${st.MAX_MISS} allowed misses consumed</div>
    </div>`;

  /* sessions list */
  const container = document.getElementById('sessions-container');
  const sessions  = data.subjects[currentId].sessions;

  if (sessions.length === 0) {
    container.innerHTML = `
      <div class="sessions-box">
        <div class="empty-state">
          <div class="ei">📋</div>
          <h3>No sessions logged yet</h3>
          <p>Use the buttons above to log whether you attended or missed a session.</p>
        </div>
      </div>`;
    return;
  }

  let html = `
    <div class="sessions-box">
      <div class="sessions-box-header">Session History (${sessions.length} / ${st.TOTAL})</div>`,

  const spw = subject.sessionsPerWeek || 2;
  sessions.forEach((sess, i) => {
    const week = Math.floor(i / spw) + 1;
    if (i % spw === 0) {
      html += `<div class="week-divider">Week ${week}</div>`;
    }
    const present   = sess.status === 'present';
    const numClass  = present ? 'sess-present' : 'sess-absent';
    const icon2     = present ? '✅' : '❌';
    const dateLabel = formatDate(sess.date);
    html += `
      <div class="session-row">
        <div class="sess-num ${numClass}">${i + 1}</div>
        <div class="sess-info">
          <div class="sess-label">Session ${i + 1} · Week ${week}</div>
          <div class="sess-date">${dateLabel}</div>
        </div>
        <span class="sess-icon">${icon2}</span>
        <button class="del-btn" onclick="deleteSession(${i})" aria-label="Delete session ${i+1}">🗑</button>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

/* ── Log session ── */
function logSession(status) {
  const sessions = data.subjects[currentId].sessions;
  const subj = SUBJECTS.find(s => s.id === currentId);
  if (sessions.length >= subj.total) {
    showToast(`All ${subj.total} sessions have been logged!`);
    return;
  }

  const dateVal = document.getElementById('session-date').value || todayStr();
  const st = stats(currentId);

  if (status === 'absent' && st.canMiss <= 0) {
    // still allow but warn strongly
  }

  sessions.push({ date: dateVal, status });
  save();
  renderDetail();
  renderDashboard();

  const st2 = stats(currentId);
  if (status === 'present') {
    showToast('✅ Marked as Present!');
  } else if (st2.canMiss <= 0) {
    showToast('🚫 Absent — you\'ve used all your skips!');
  } else {
    showToast(`❌ Absent — ${st2.canMiss} skip${st2.canMiss !== 1 ? 's' : ''} remaining`);
  }
}

/* ── Delete session ── */
function deleteSession(index) {
  data.subjects[currentId].sessions.splice(index, 1);
  save();
  renderDetail();
  renderDashboard();
  showToast('Session deleted');
}

/* ── Helpers ── */
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('banner_dismissed', '1');
}

/* ── PWA install banner ── */
function checkBanner() {
  const standalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  const dismissed = localStorage.getItem('banner_dismissed');
  if (!standalone && !dismissed) {
    document.getElementById('install-banner').style.display = 'flex';
  }
}

/* ── Service worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

/* ── Init ── */
// ensure all subjects exist in data
SUBJECTS.forEach(s => {
  if (!data.subjects[s.id]) data.subjects[s.id] = { sessions: [] };
});

renderDashboard();
checkBanner();
</script>
</body>
</html>
