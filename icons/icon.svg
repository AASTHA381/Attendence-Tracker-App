<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#4f46e5"/>

  <!-- Book base -->
  <rect x="38" y="52" width="116" height="90" rx="10" fill="#fff" opacity="0.15"/>

  <!-- Book pages (right side) -->
  <rect x="96" y="56" width="54" height="82" rx="6" fill="#fff" opacity="0.9"/>
  <!-- Page lines -->
  <rect x="104" y="70" width="38" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="104" y="82" width="30" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="104" y="94" width="34" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="104" y="106" width="26" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="104" y="118" width="32" height="4" rx="2" fill="#c7d2fe"/>

  <!-- Book spine / left page -->
  <rect x="42" y="56" width="54" height="82" rx="6" fill="#6366f1"/>
  <!-- Spine highlight -->
  <rect x="42" y="56" width="8" height="82" rx="4" fill="#818cf8"/>

  <!-- Check mark circle (bottom right) -->
  <circle cx="144" cy="144" r="28" fill="#22c55e"/>
  <polyline points="132,144 141,153 156,135" 
            stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
